server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Gzip compression for speed
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle React Router (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PROXY CONFIGURATION: The content is local, but logic is in N8N
    # This matches the setup in vite.config.js but for production
    location /webhook/ {
        # Redirects internal calls /webhook/... to the new Node.js server
        proxy_pass http://server:5000/webhook/;
        
        # Headers required for proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Increase timeouts for AI processing
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhook-test/ {
        proxy_pass http://server:5000/webhook-test/;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://server:5000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
